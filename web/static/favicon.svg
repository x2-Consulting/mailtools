<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Purple rounded square background matching --accent #6366f1 -->
  <rect width="32" height="32" rx="7" fill="#6366f1"/>
  <!-- Envelope body (white filled rect) -->
  <rect x="4.5" y="13" width="23" height="14" rx="2" fill="white"/>
  <!-- Open flap: two lines from top corners rising to centre point -->
  <line x1="4.5"  y1="13" x2="16" y2="6.5" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="27.5" y1="13" x2="16" y2="6.5" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <!-- V-fold inside envelope body -->
  <polyline points="4.5,13 16,20.5 27.5,13" fill="none" stroke="#6366f1" stroke-width="1.6" stroke-linejoin="round"/>
</svg>
